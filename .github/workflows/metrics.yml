# Setup Instructions:
# 1. Go to GitHub Settings → Developer Settings → Personal Access Tokens
# 2. Generate a classic token with scopes: read:user, repo
# 3. Add it as a repository secret named METRICS_TOKEN

name: Metrics
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          config_theme: dark
          
          # 1. Profile header
          base: header
          
          # 2. Contributions calendar (small/half-year) & streaks
          plugin_isocalendar: yes
          
          # 3. Languages chart
          plugin_languages: yes
          plugin_languages_limit: 8
          
          # 4. Recent activity (strictly filtered to avoid "Unexpected error")
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_filter: issue, pr, release, fork, review
          plugin_activity_visibility: public
